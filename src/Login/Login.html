<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="./Login.css">
</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <p class="signup-link">
            New user?
            <a href="../Sign_Up/Sign_Up.html">Sign Up Here</a>
        </p>

        <form>

            <div class="form-group">
                <label for="email">Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                    class="form-control"
                >
            </div>

            <div class="btn-group">

                <button type="submit" class="btn login-btn">
                    Login
                </button>

                <button type="reset" class="btn reset-btn">
                    Reset
                </button>

            </div>

        </form>

        <p class="forgot-password">
            Forgot Password?
        </p>

    </div>

</body>
</html>
